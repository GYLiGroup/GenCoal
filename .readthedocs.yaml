version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.8"

python:
  version: "3.8"
  install:
    - requirements: requirements.txt  # Ensure `sphinx_rtd_theme` is in this file
    - pip:
        - sphinx_rtd_theme  # Add any additional dependencies here if missing from `requirements.txt`

sphinx:
  configuration: docs/source/conf.py

formats:
  - htmlzip
  - pdf
  - epub
